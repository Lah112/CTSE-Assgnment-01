# Nginx configuration for the DriveCore React SPA.
#
# Key responsibility: serve the built React app and forward ALL
# non-file requests back to index.html so that React Router's
# client-side pushState routing works correctly — without this,
# a hard refresh on /dashboard/billing would return a 404.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header X-Frame-Options          "SAMEORIGIN"           always;
    add_header X-Content-Type-Options   "nosniff"              always;
    add_header X-XSS-Protection         "1; mode=block"        always;
    add_header Referrer-Policy          "strict-origin"        always;

    # --- Gzip compression ---
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- Static asset caching ---
    # Vite hashes all JS/CSS filenames, so we can cache them aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- SPA fallback ---
    # Any URL that does not match a real file is redirected to index.html,
    # which lets React Router take over and render the correct route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
