name: DriveCore — Inventory Service CI

# Trigger on every push or pull-request targeting the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    name: Build, Lint & Snyk SAST
    runs-on: ubuntu-latest

    defaults:
      run:
        # All steps execute from inside the service directory
        working-directory: drivecore-inventory-service

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Node.js 20 with npm dependency caching
      # -----------------------------------------------------------------------
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: drivecore-inventory-service/package-lock.json

      # -----------------------------------------------------------------------
      # 3. Install production + dev dependencies
      #    Uses `npm ci` (clean install) for deterministic, reproducible builds.
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # 4. Run tests
      #    Currently a placeholder — replace with your real test command once
      #    tests are written (e.g., `npm test` with Jest/Mocha).
      # -----------------------------------------------------------------------
      - name: Run tests
        run: npm test

      # -----------------------------------------------------------------------
      # 5. DevSecOps — Snyk SAST (Software Composition Analysis)
      #
      #    Snyk scans package.json/package-lock.json for known CVEs in
      #    third-party dependencies (free tier, no SARIF upload required).
      #
      #    Prerequisites:
      #      • Add your Snyk API token as a GitHub repository secret:
      #        Settings → Secrets and variables → Actions → New secret
      #        Name: SNYK_TOKEN
      #
      #    The `--severity-threshold=high` flag makes the step fail only when
      #    high or critical vulnerabilities are found, preventing noise from
      #    low/medium issues blocking the pipeline.
      #
      #    SARIF upload is intentionally omitted to avoid path-resolution
      #    errors in monorepo layouts where the service is a sub-directory.
      # -----------------------------------------------------------------------
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=drivecore-inventory-service/package.json
