name: CI – DriveCore Booking Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: drivecore-booking-service

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js 20 ───────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: drivecore-booking-service/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Generate Prisma client ─────────────────────────────────────────
      # Prisma client must be generated before any code that imports it can run.
      # In CI we use a dummy DATABASE_URL since we are not connecting to a real DB.
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost/db"

      # ── 5. Run tests ──────────────────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── 6. Snyk SAST – Dependency Vulnerability Scan ─────────────────────
      # Requires SNYK_TOKEN secret:
      #   GitHub repo → Settings → Secrets and variables → Actions → New secret
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --severity-threshold=high
            --file=drivecore-booking-service/package.json

      # ── 7. Upload Snyk SARIF to GitHub Code Scanning ─────────────────────
      - name: Generate Snyk SARIF report
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --sarif-file-output=snyk.sarif
            --file=drivecore-booking-service/package.json

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: drivecore-booking-service/snyk.sarif
