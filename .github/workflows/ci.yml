name: CI – DriveCore User Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    name: Build, Lint & Security Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: drivecore-user-service

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: drivecore-user-service/package-lock.json

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Run tests ─────────────────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── 5. Snyk Security Scan ────────────────────────────────────────────
      # Requires SNYK_TOKEN secret to be set in GitHub repository settings:
      #   Settings → Secrets and variables → Actions → New repository secret
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=drivecore-user-service/package.json

      # ── 6. Upload Snyk report as artifact ───────────────────────────────
      - name: Upload Snyk SARIF report
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif --file=drivecore-user-service/package.json

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: drivecore-user-service/snyk.sarif
